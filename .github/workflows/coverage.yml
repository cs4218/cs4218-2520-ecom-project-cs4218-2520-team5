name: Jest Coverage

on:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Run frontend Jest coverage
        run: |
          cd client
          npm test -- --coverage --coverageReporters=json-summary --coverageReporters=json

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: client/coverage/coverage-summary.json
