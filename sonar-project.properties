# SonarQube server settings
sonar.host.url=http://localhost:9000
sonar.token=squ_5fc197a82ad9b12b2f5c3bc7df0b956fdfc8a8fe

# Project identification
sonar.projectKey=econ
sonar.projectName=econ
sonar.projectVersion=1.0

# Analysis settings — include both frontend (client/src) and backend
sonar.sources=client/src,controllers,models,middlewares,helpers,config,routes
sonar.exclusions=**/node_modules/**,**/_site/**,**/coverage/**,**/*.test.js,**/setupTests.js,**/reportWebVitals.js

# Test files
sonar.tests=client/src,controllers,models,middlewares,helpers
sonar.test.inclusions=**/*.test.js

# LCOV coverage reports generated by Jest
sonar.javascript.lcov.reportPaths=coverage/backend/lcov.info,coverage/frontend/lcov.info
